<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>View Food | EcoEats</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    // Redirect to login if not logged in
    if (!localStorage.getItem("loggedUser")) {
      window.location.href = "login.html";
    }
  </script>
</head>
<body>
  <header>
    <h1>EcoEats</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="post.html">Post Food</a>
      <a href="#" onclick="logout()">Logout</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <label><strong>Filter by Campus:</strong></label>
      <select id="campusFilter" onchange="renderPosts()">
        <option value="">-- All Campuses --</option>
        <option value="Tempe">Tempe</option>
        <option value="Polytechnic">Polytechnic</option>
        <option value="Downtown Phoenix">Downtown Phoenix</option>
      </select>
    </div>

    <div id="postsContainer"></div>
  </main>

  <script>
    function logout() {
      localStorage.removeItem("loggedUser");
      window.location.href = "login.html";
    }

    function renderPosts() {
      const container = document.getElementById("postsContainer");
      container.innerHTML = "";

      const posts = JSON.parse(localStorage.getItem("posts") || "[]");
      const filterCampus = document.getElementById("campusFilter").value;
      const user = localStorage.getItem("loggedUser");

      const filteredPosts = filterCampus
        ? posts.filter(post => post.campus === filterCampus)
        : posts;

      if (filteredPosts.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>No posts available.</p>";
        return;
      }

      filteredPosts.forEach((post, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h3>${post.event} (${post.campus})</h3>
          <p><strong>Organization:</strong> ${post.org}</p>
          <p><strong>Location:</strong> ${post.location}</p>
          <p>${post.description}</p>
          ${post.image ? `<img src="${post.image}" alt="Food Photo" width="300" style="border-radius: 10px; margin: 10px 0;" />` : ""}
          ${post.user === user ? `<button onclick="deletePost(${index})">Delete</button>` : ""}
        `;
        container.appendChild(card);
      });
    }

    function deletePost(index) {
      if (confirm("Are you sure you want to delete this post?")) {
        let posts = JSON.parse(localStorage.getItem("posts") || "[]");
        posts.splice(index, 1);
        localStorage.setItem("posts", JSON.stringify(posts));
        renderPosts();
      }
    }

    window.onload = renderPosts;
  </script>
<script>
  // Ask permission on page load
  document.addEventListener("DOMContentLoaded", () => {
    if ("Notification" in window && Notification.permission !== "granted") {
      Notification.requestPermission();
    }

    // Poll for new posts (mock check every 10 seconds)
    setInterval(checkNewPosts, 10000); // check every 10s
  });

  let latestTimestamp = localStorage.getItem("lastPostTime") || null;

  async function checkNewPosts() {
    const posts = JSON.parse(localStorage.getItem("foodPosts") || "[]");
    if (posts.length === 0) return;

    const newest = posts[posts.length - 1];
    if (!latestTimestamp || newest.timestamp > latestTimestamp) {
      // Only notify if user isn't the one who just posted
      const loggedUser = localStorage.getItem("loggedUser");
      if (newest.email !== loggedUser) {
        notifyUser(newest);
      }
      localStorage.setItem("lastPostTime", newest.timestamp);
    }
  }

  function notifyUser(post) {
    if (Notification.permission === "granted") {
      new Notification("🍱 New Food Available!", {
        body: `${post.organization} just posted at ${post.campus} campus`,
        icon: "logo.png", // optional: use your logo here
      });
    }
  }
</script>

</body>
</html>

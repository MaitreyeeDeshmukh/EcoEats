name = "ecoeats-auth"
main = "index.ts"
compatibility_date = "2026-04-08"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "development"

[build]
command = "npm run build"

[secrets]
SUPABASE_DB_URL
RESEND_API_KEY
BETTER_AUTH_SECRET

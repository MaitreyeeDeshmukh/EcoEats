<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | EcoEats</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fff7f3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-card {
      background-color: white;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #5c0000;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      color: #800000;
      text-align: left;
    }

    input[type="email"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #800000;
      color: gold;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #a30000;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>Login to EcoEats</h2>
    <form onsubmit="login(event)">
      <label for="email">Enter your ASU Email:</label>
      <input type="email" id="email" placeholder="example@asu.edu" required />
      <button type="submit">Login</button>
    </form>
  </div>

  <script>
    function login(e) {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      if (email.endsWith("@asu.edu")) {
        localStorage.setItem("loggedUser", email);
        window.location.href = "index.html";
      } else {
        alert("Please enter a valid @asu.edu email address.");
      }
    }
  </script>
</body>
</html>
